kind = "web"
previewPath = "/"
title = "Sunil Ravva – About Me"
version = "1.0.0"
id = "artifacts/sunil-ravva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24878

[services.development]
run = "pnpm --filter @workspace/sunil-ravva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sunil-ravva", "run", "build" ]
publicDir = "artifacts/sunil-ravva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24878"
BASE_PATH = "/"
